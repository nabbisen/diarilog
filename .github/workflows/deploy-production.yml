name: Deploy — production

on:
  workflow_dispatch:
    inputs:
      confirm_tag:
        description: >
          Git tag or commit SHA being promoted to production.
          Must match the HEAD of main. This is a manual sanity-check,
          not a technical enforcement — the approver confirms the right
          version is being released.
        required: true
      deploy_all:
        description: >
          Deploy all workers regardless of change detection.
          Use when recovering from a partial deploy or rolling back.
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  RUST_VERSION: "1.91"

jobs:
  verify-tag:
    name: Verify tag matches HEAD
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check tag matches HEAD
        run: |
          HEAD=$(git rev-parse HEAD)
          TAG="${{ inputs.confirm_tag }}"
          TAG_COMMIT=$(git rev-parse "${TAG}" 2>/dev/null || echo "${TAG}")
          if [ "${HEAD}" != "${TAG_COMMIT}" ]; then
            echo "::error::confirm_tag '${TAG}' resolves to ${TAG_COMMIT},"
            echo "::error::but HEAD is ${HEAD}. Deploy aborted."
            exit 1
          fi
          echo "Tag verified: ${TAG} → ${TAG_COMMIT}"

  detect-changes:
    name: Detect changed workers
    runs-on: ubuntu-latest
    needs: verify-tag
    outputs:
      identity: ${{ inputs.deploy_all == 'true' && 'true' || steps.filter.outputs.identity }}
      safety:   ${{ inputs.deploy_all == 'true' && 'true' || steps.filter.outputs.safety }}
      journal:  ${{ inputs.deploy_all == 'true' && 'true' || steps.filter.outputs.journal }}
      dialog:   ${{ inputs.deploy_all == 'true' && 'true' || steps.filter.outputs.dialog }}
      bff:      ${{ inputs.deploy_all == 'true' && 'true' || steps.filter.outputs.bff }}
      gateway:  ${{ inputs.deploy_all == 'true' && 'true' || steps.filter.outputs.gateway }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # Same filter set as deploy-staging.yml
          filters: |
            identity:
              - 'workers/identity/**'
              - 'packages/contracts/**'
              - 'packages/errors/**'
            safety:
              - 'workers/safety/**'
              - 'packages/contracts/**'
              - 'packages/errors/**'
            journal:
              - 'workers/journal/**'
              - 'packages/contracts/**'
              - 'packages/errors/**'
            dialog:
              - 'workers/dialog/**'
              - 'workers/safety/**'
              - 'packages/contracts/**'
              - 'packages/errors/**'
            bff:
              - 'workers/bff/**'
              - 'workers/bff-hydrate/**'
              - 'packages/web-app/**'
              - 'packages/contracts/**'
              - 'packages/sb-client/**'
              - 'packages/errors/**'
            gateway:
              - 'workers/gateway/**'
              - 'packages/contracts/**'
              - 'packages/auth-core/**'
              - 'packages/errors/**'

  deploy:
    name: Deploy changed workers (production)
    runs-on: ubuntu-latest
    needs: detect-changes
    # This environment requires reviewer approval before any step runs.
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy identity (production)
        if: needs.detect-changes.outputs.identity == 'true'
        working-directory: workers/identity
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_PRODUCTION }}
        run: npx wrangler deploy

      - name: Deploy safety (production)
        if: needs.detect-changes.outputs.safety == 'true'
        working-directory: workers/safety
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_PRODUCTION }}
        run: npx wrangler deploy

      - name: Deploy journal (production)
        if: needs.detect-changes.outputs.journal == 'true'
        working-directory: workers/journal
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_PRODUCTION }}
        run: npx wrangler deploy

      - name: Deploy dialog (production)
        if: needs.detect-changes.outputs.dialog == 'true'
        working-directory: workers/dialog
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_PRODUCTION }}
        run: npx wrangler deploy

      - name: Install Rust (for bff-hydrate build)
        if: needs.detect-changes.outputs.bff == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y rustc-${{ env.RUST_VERSION }} cargo-${{ env.RUST_VERSION }}
          sudo ln -sf /usr/bin/cargo-${{ env.RUST_VERSION }} /usr/local/bin/cargo
          sudo ln -sf /usr/bin/rustc-${{ env.RUST_VERSION }} /usr/local/bin/rustc
          cargo install wasm-pack --locked --quiet

      - name: Build bff-hydrate CSR bundle
        if: needs.detect-changes.outputs.bff == 'true'
        run: bash scripts/build-bff-hydrate.sh

      - name: Deploy bff (production)
        if: needs.detect-changes.outputs.bff == 'true'
        working-directory: workers/bff
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_PRODUCTION }}
        run: npx wrangler deploy

      - name: Deploy gateway (production)
        if: needs.detect-changes.outputs.gateway == 'true'
        working-directory: workers/gateway
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_PRODUCTION }}
        run: npx wrangler deploy
