name: Deploy — staging

on:
  push:
    branches: [main]

# Require the CI job to pass before we even attempt to deploy.
concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  RUST_VERSION: "1.91"

jobs:
  detect-changes:
    name: Detect which workers changed
    runs-on: ubuntu-latest
    outputs:
      identity: ${{ steps.filter.outputs.identity }}
      safety:   ${{ steps.filter.outputs.safety }}
      journal:  ${{ steps.filter.outputs.journal }}
      dialog:   ${{ steps.filter.outputs.dialog }}
      bff:      ${{ steps.filter.outputs.bff }}
      gateway:  ${{ steps.filter.outputs.gateway }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for paths-filter to compare commits

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            identity:
              - 'workers/identity/**'
              - 'packages/contracts/**'
              - 'packages/errors/**'
            safety:
              - 'workers/safety/**'
              - 'packages/contracts/**'
              - 'packages/errors/**'
            journal:
              - 'workers/journal/**'
              - 'packages/contracts/**'
              - 'packages/errors/**'
            dialog:
              - 'workers/dialog/**'
              - 'workers/safety/**'
              - 'packages/contracts/**'
              - 'packages/errors/**'
            bff:
              - 'workers/bff/**'
              - 'workers/bff-hydrate/**'
              - 'packages/web-app/**'
              - 'packages/contracts/**'
              - 'packages/sb-client/**'
              - 'packages/errors/**'
            gateway:
              - 'workers/gateway/**'
              - 'packages/contracts/**'
              - 'packages/auth-core/**'
              - 'packages/errors/**'

  deploy:
    name: Deploy changed workers (staging)
    runs-on: ubuntu-latest
    needs: detect-changes
    environment: staging
    # Each step is conditional; workers deploy in dependency order
    # (callees first: identity → safety → journal → dialog → bff → gateway).

    steps:
      - uses: actions/checkout@v4

      # ── identity ──────────────────────────────────────────────────────────
      - name: Deploy identity (staging)
        if: needs.detect-changes.outputs.identity == 'true'
        working-directory: workers/identity
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_STAGING }}
        run: npx wrangler deploy --env staging

      # ── safety ────────────────────────────────────────────────────────────
      - name: Deploy safety (staging)
        if: needs.detect-changes.outputs.safety == 'true'
        working-directory: workers/safety
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_STAGING }}
        run: npx wrangler deploy --env staging

      # ── journal ───────────────────────────────────────────────────────────
      - name: Deploy journal (staging)
        if: needs.detect-changes.outputs.journal == 'true'
        working-directory: workers/journal
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_STAGING }}
        run: npx wrangler deploy --env staging

      # ── dialog ────────────────────────────────────────────────────────────
      - name: Deploy dialog (staging)
        if: needs.detect-changes.outputs.dialog == 'true'
        working-directory: workers/dialog
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_STAGING }}
        run: npx wrangler deploy --env staging

      # ── bff (hydrate build first, then worker) ────────────────────────────
      - name: Install Rust (for bff-hydrate wasm-pack build)
        if: needs.detect-changes.outputs.bff == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y rustc-${{ env.RUST_VERSION }} cargo-${{ env.RUST_VERSION }}
          sudo ln -sf /usr/bin/cargo-${{ env.RUST_VERSION }} /usr/local/bin/cargo
          sudo ln -sf /usr/bin/rustc-${{ env.RUST_VERSION }} /usr/local/bin/rustc
          cargo install wasm-pack --locked --quiet

      - name: Build bff-hydrate CSR bundle
        if: needs.detect-changes.outputs.bff == 'true'
        run: bash scripts/build-bff-hydrate.sh

      - name: Deploy bff (staging)
        if: needs.detect-changes.outputs.bff == 'true'
        working-directory: workers/bff
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_STAGING }}
        run: npx wrangler deploy --env staging

      # ── gateway ───────────────────────────────────────────────────────────
      - name: Deploy gateway (staging)
        if: needs.detect-changes.outputs.gateway == 'true'
        working-directory: workers/gateway
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_STAGING }}
        run: npx wrangler deploy --env staging
